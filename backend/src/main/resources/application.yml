server:
  # 8090, not the Spring Boot default 8080 -- avoids colliding with other
  # local Docker services (e.g. a gateway on 8080) that may already be running.
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: household-ops

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:household_ops}
    username: ${DB_USER:household_ops}
    password: ${DB_PASSWORD:household_ops}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 7

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.householdops.app: DEBUG
