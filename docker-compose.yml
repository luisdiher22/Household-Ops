services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: household_ops
      POSTGRES_USER: household_ops
      POSTGRES_PASSWORD: household_ops
    ports:
      # Host port 5433, not 5432 -- avoids colliding with a locally installed
      # Postgres Windows service that may already be bound to 5432.
      - "5433:5432"
    volumes:
      - household-ops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U household_ops -d household_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Optional: export ANTHROPIC_API_KEY on the host before `docker compose up`
      # to enable the assistant page; the rest of the app works without it.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  household-ops-postgres-data:
